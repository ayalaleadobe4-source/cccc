name: 🌐 Remote Chromium Browser

on:
  workflow_dispatch:
    inputs:
      vnc_password:
        description: 'סיסמת גישה (לפחות 6 תווים)'
        required: true
        type: string

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 359

    steps:
      - name: 📦 התקנת תלויות
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            x11vnc \
            openbox \
            chromium-browser \
            novnc \
            websockify \
            curl \
            net-tools \
            python3 \
            2>/dev/null || true

      - name: 🌐 התקנת ZeroTier
        run: |
          curl -s https://install.zerotier.com | sudo bash
          sudo systemctl start zerotier-one
          sleep 3

          sudo zerotier-cli join ${{ secrets.ZEROTIER_NETWORK_ID }}
          echo "✅ הצטרפת לרשת: ${{ secrets.ZEROTIER_NETWORK_ID }}"

          echo "⏳ ממתין לאישור ב-ZeroTier Central..."
          for i in $(seq 1 24); do
            STATUS=$(sudo zerotier-cli listnetworks 2>/dev/null | grep "${{ secrets.ZEROTIER_NETWORK_ID }}" || true)
            if echo "$STATUS" | grep -q "OK"; then
              echo "✅ מחובר!"
              break
            fi
            echo "  ניסיון $i/24 – אשר את המכשיר ב-my.zerotier.com"
            sleep 5
          done

          sudo zerotier-cli listnetworks

          ZT_IP=$(ip addr show | grep 'inet 10\.' | awk '{print $2}' | cut -d'/' -f1 | head -1)
          echo "ZT_IP=$ZT_IP" >> $GITHUB_ENV
          echo "🌐 ZeroTier IP: $ZT_IP"

      - name: 🖥️ הפעלת מסך וירטואלי
        run: |
          Xvfb :1 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 2
          echo "DISPLAY=:1" >> $GITHUB_ENV
          DISPLAY=:1 openbox &
          sleep 1
          echo "✅ דסקטופ וירטואלי פועל"

      - name: 🔒 הפעלת x11vnc
        run: |
          x11vnc \
            -display :1 \
            -passwd "${{ github.event.inputs.vnc_password }}" \
            -forever \
            -shared \
            -port 5900 \
            -noxdamage \
            -bg -quiet
          sleep 2
          echo "✅ x11vnc פועל על פורט 5900"

      - name: 🌍 הפעלת noVNC
        run: |
          websockify \
            --web /usr/share/novnc \
            --wrap-mode=ignore \
            6080 \
            localhost:5900 &
          sleep 2
          echo "✅ noVNC פועל על פורט 6080"

      - name: 🚀 הפעלת Chromium
        run: |
          DISPLAY=:1 chromium-browser \
            --no-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --no-first-run \
            --no-default-browser-check \
            --disable-sync \
            --disable-background-networking \
            --disable-client-side-phishing-detection \
            --disable-domain-reliability \
            --disable-component-update \
            --disable-breakpad \
            --metrics-recording-only \
            --no-report-upload \
            --window-size=1920,1080 \
            --start-maximized \
            "https://whatismyipaddress.com" &
          sleep 3
          echo "✅ Chromium פועל!"

      - name: 📋 פרטי גישה
        run: |
          echo ""
          echo "=================================================="
          echo "🎉 הכל פועל! כך תתחבר:"
          echo "=================================================="
          echo ""
          echo "  פתח בדפדפן שלך:"
          echo ""
          echo "  👉  http://$ZT_IP:6080/vnc.html"
          echo ""
          echo "  סיסמה: [מה שהזנת ב-workflow_dispatch]"
          echo ""
          echo "  📌 ZeroTier IP: $ZT_IP"
          echo "  🔌 noVNC port:  6080"
          echo "  🖥️  VNC port:    5900"
          echo ""
          echo "  ⏱️  הסשן יסתיים בעוד ~350 דקות (GitHub מגביל ל-6 שעות)"
          echo "=================================================="

      - name: ⏳ שמירת הסשן פעיל – 350 דקות
        run: |
          # 350 דקות = 21,000 שניות
          # נשאיר 9 דקות buffer לפני timeout-minutes: 359
          END_TIME=$(( $(date +%s) + 21000 ))

          while [ $(date +%s) -lt $END_TIME ]; do
            sleep 300
            REMAINING=$(( (END_TIME - $(date +%s)) / 60 ))
            echo "⏱️  נותרו ~$REMAINING דקות | $(date '+%H:%M:%S')"

            # אם Chromium נסגר בטעות – הפעל מחדש
            if ! pgrep -f "chromium" > /dev/null 2>&1; then
              echo "🔄 מפעיל Chromium מחדש..."
              DISPLAY=:1 chromium-browser \
                --no-sandbox --disable-dev-shm-usage \
                --start-maximized &
            fi
          done

          echo "✅ הסשן הסתיים לאחר 350 דקות"
