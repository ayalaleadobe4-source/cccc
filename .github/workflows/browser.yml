name: 🌐 Remote Chromium Browser

on:
  workflow_dispatch:
    inputs:
      vnc_password:
        description: 'סיסמת גישה'
        required: true
        type: string

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 359

    steps:
      - name: 🌐 התקנת ZeroTier
        run: |
          curl -s https://install.zerotier.com | sudo bash
          sudo systemctl start zerotier-one
          sleep 3

          sudo zerotier-cli join ${{ secrets.ZEROTIER_NETWORK_ID }}

          echo "⏳ ממתין לאישור ב-ZeroTier Central..."
          for i in $(seq 1 24); do
            STATUS=$(sudo zerotier-cli listnetworks 2>/dev/null | grep "${{ secrets.ZEROTIER_NETWORK_ID }}" || true)
            if echo "$STATUS" | grep -q "OK"; then
              echo "✅ מחובר!"
              break
            fi
            echo "  ניסיון $i/24 – אשר את המכשיר ב-my.zerotier.com"
            sleep 5
          done

          ZT_IP=$(ip addr show | grep 'inet 10\.' | awk '{print $2}' | cut -d'/' -f1 | head -1)
          echo "ZT_IP=$ZT_IP" >> $GITHUB_ENV
          echo "🌐 ZeroTier IP: $ZT_IP"

      - name: 🐳 הרצת Chromium בדוקר
        run: |
          docker run -d \
            --name=chromium \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Asia/Jerusalem \
            -e CHROME_CLI=https://google.com/ \
            -e CUSTOM_USER=user \
            -e PASSWORD=${{ github.event.inputs.vnc_password }} \
            -p 3000:3000 \
            -p 3001:3001 \
            --shm-size="2gb" \
            lscr.io/linuxserver/chromium:latest

          echo "⏳ ממתין שהקונטיינר יעלה..."
          sleep 10
          docker ps

      - name: 📋 פרטי גישה
        run: |
          echo ""
          echo "=================================================="
          echo "🎉 הכל פועל!"
          echo "=================================================="
          echo ""
          echo "  👉  http://$ZT_IP:3000"
          echo ""
          echo "  משתמש: user"
          echo "  סיסמה: [מה שהזנת]"
          echo ""
          echo "  ⏱️  פעיל עד ~350 דקות"
          echo "=================================================="

      - name: ⏳ שמירת הסשן פעיל – 350 דקות
        run: |
          END_TIME=$(( $(date +%s) + 21000 ))

          while [ $(date +%s) -lt $END_TIME ]; do
            sleep 300
            REMAINING=$(( (END_TIME - $(date +%s)) / 60 ))
            echo "⏱️  נותרו ~$REMAINING דקות | $(date '+%H:%M:%S')"

            if ! docker ps | grep -q chromium; then
              echo "🔄 מפעיל קונטיינר מחדש..."
              docker start chromium
            fi
          done
